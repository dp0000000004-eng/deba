<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=NTR&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
  <link rel="icon" href="img-sourse/favicon.ico">
 </head>
<body>
  <header>
    <div class="brand">Debasish Pradhan</div>
    <nav id="nav-link">
    </nav>
    <div class="nav-icons" id="nav-icons">
    </div>
  </header>
  <main class="page">
    <!-- HERO -->
    <section class="hero" id="home">
    </section>
    <div class="divider"></div>
    <!-- ABOUT -->
    <section class="about-section panel" id="about">
    </section>
    <!-- EXPERIENCE -->
    <section class="experience panel" id="experience">
      <div class="experience-head">
        <h2 class="section-headline"><span>/</span> experience</h2>
      </div>
      <div class="experience-layout">
        <aside class="experience-tabs" id="button-Sft">
          <button class="exp-tab " type="button" id="web-dev">Web Development</button>
          <button class="exp-tab " type="button" id="py-dev">Python Practice</button>
        </aside>
        <div class="experience-content">
          <h3 class="experience-role">Student Developer @ Self-driven Projects</h3>
          <p class="experience-date">2025 - Present</p>
          <ul class="experience-points" id="experience-points">
          </ul>
        </div>
      </div>
    </section>

    <section class="experience panel" id="skills">
    </section>

    <section class="experience panel" id="hobby">
      <div class="experience-head">
        <h2 class="section-headline"><span>/</span>hobby </h2>
      </div>
      <div class="experience-content">
        <h3 class="experience-role"></h3>
        <ul class="experience-points" id="experience-points-hobby">
        </ul>
      </div>
    </section>

    <section class="experience panel" id="lrn-el">
      
    </section>
  <script type="module" src="main.js"></script>
  </main>

  <!-- FOOTER -->
  <footer id="footer-contact">
      
  </footer>
</body>
</html>
